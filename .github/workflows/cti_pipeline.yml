name: Daily Cyber Threat Intelligence Pipeline

on:
  schedule:
    # 每天世界標準時間 (UTC) 00:00 執行，相當於台灣時間 (UTC+8) 早上 08:00
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許您在 GitHub 網頁上手動點擊按鈕立即執行

jobs:
  run-cti-pipeline:
    runs-on: ubuntu-latest

    steps:
    # 1. 複製 GitHub 儲存庫的原始碼
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 設定 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-numeric-version: '3.10'

    # 3. 快取 Python 套件以加速未來的執行
    - name: Cache Pip Dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    # 4. 安裝執行所需的必要套件
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser pandas google-generativeai pydantic supabase

    # 5. 執行 Python 爬蟲並自動同步至 Supabase
    # 這裡將 GitHub Secrets 的金鑰安全地注入成環境變數
    - name: Run CTI Pipeline
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python enterprise_cti_pipeline.py
